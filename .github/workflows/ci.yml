name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Component tests (${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install website dependencies
        run: cd website && bun install --frozen-lockfile

      - name: Install Playwright browser
        run: bun --cwd website playwright install --with-deps chromium

      - name: Build framework
        run: bun run build

      - name: Run component tests
        run: bun run test:components -- --shard=${{ matrix.shard }}/4

  docs:
    name: Build documentation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install website dependencies
        run: cd website && bun install --frozen-lockfile

      - name: Build framework
        run: bun run build

      - name: Build documentation site
        run: cd website && bun run bundle
