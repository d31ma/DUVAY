<h1>Avatars</h1>
<p>User profile images, icons, initials, and badge indicators.</p>

<h2>Content</h2>
<demo-compare>
  <div slot="css">
    <div class="w-row ga-2 flex-wrap align-center">
      <span class="w-avatar"><img src="https://i.pravatar.cc/150?img=1" alt="Ari Lane" /></span>
      <span class="w-avatar" data-w-initials="DUVAY"></span>
      <span class="w-avatar"><span class="w-avatar-icon">person</span></span>
    </div>
  </div>
  <div slot="wc">
    <div class="w-row ga-2 flex-wrap align-center">
      <w-avatar image="https://i.pravatar.cc/150?img=1" alt="Ari Lane"></w-avatar>
      <w-avatar text="DUVAY" alt="DuVay initials"></w-avatar>
      <w-avatar icon="person" alt="Person icon"></w-avatar>
    </div>
  </div>
</demo-compare>

<h2>Sizes</h2>
<p>Use Vuetify-style sizes: <code>x-small</code>, <code>small</code>, <code>default</code>, <code>large</code>, and <code>x-large</code>. DuVay aliases like <code>sm</code> and <code>lg</code> still work.</p>
<demo-compare>
  <div slot="css">
    <div class="w-row ga-2 flex-wrap align-center">
      <span class="w-avatar w-avatar--x-small" data-w-initials="XS"></span>
      <span class="w-avatar w-avatar--small" data-w-initials="SM"></span>
      <span class="w-avatar" data-w-initials="MD"></span>
      <span class="w-avatar w-avatar--large" data-w-initials="LG"></span>
      <span class="w-avatar w-avatar--x-large" data-w-initials="XL"></span>
    </div>
  </div>
  <div slot="wc">
    <div class="w-row ga-2 flex-wrap align-center">
      <w-avatar text="XS" size="x-small"></w-avatar>
      <w-avatar text="SM" size="small"></w-avatar>
      <w-avatar text="MD"></w-avatar>
      <w-avatar text="LG" size="large"></w-avatar>
      <w-avatar text="XL" size="x-large"></w-avatar>
    </div>
  </div>
</demo-compare>
